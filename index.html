<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake P2W RPG</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Player Dashboard -->
    <div id="interface">
        <h2>⚔️ Stage <span id="txt-stage">1</span></h2>
        <p>💰 Gold: <span id="txt-gold">0</span></p>
        <p>❤️ HP: <span id="txt-hp">100</span> / <span id="txt-hp-max">100</span></p>
        <p>💪 Attack: <span id="txt-attack">10</span></p>
    </div>
    
    <hr>
    <div id="shop-interface">
        <h3>🛒 Cash Shop (Gold Upgrades)</h3>
        <div style="margin-bottom: 8px;">
            <button id="btn-buy-attack" style="padding: 6px 12px; font-weight: bold;">💪 Buy Attack (+2) | 💰 Cost: <span id="lbl-cost-attack">10</span>g</button>
        </div>
        <div>
            <button id="btn-buy-hp" style="padding: 6px 12px; font-weight: bold;">❤️ Buy Max HP (+20) | 💰 Cost: <span id="lbl-cost-hp">15</span>g</button>
        </div>
    </div>

    <hr>
    <!-- Dynamic State Dashboard -->
    <div id="enemy-interface" style="color: #a00; min-height: 50px;">
        <p style="font-size: 1.2rem; font-weight: bold;" id="txt-enemy-hp">--</p>
    </div>
    <hr>

    <!-- Combat Log -->
    <div id="log" style="height: 120px; overflow-y: auto; background: #eee; padding: 10px; font-family: monospace;">
        <p>Game starting...</p>
    </div>

    <hr>

    <script type="module" src="src/main.js"></script>
    <script type="module" src="src/shop.js"></script> 
</body>
</body>
</html>
